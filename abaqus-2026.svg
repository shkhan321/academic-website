<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Abaqus CAE 2026 finite element analysis workstation</title>
  <desc id="desc">A clean finite element analysis graphic for the lab equipment page showing Abaqus CAE 2026 and a simulated composite plate.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.55" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#fef9c3"/>
    </linearGradient>
    <linearGradient id="stress" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="0.3" stop-color="#06b6d4"/>
      <stop offset="0.55" stop-color="#22c55e"/>
      <stop offset="0.75" stop-color="#facc15"/>
      <stop offset="1" stop-color="#dc2626"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="15" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="720" height="420" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="48" y="52" width="624" height="316" rx="26" fill="#ffffff"/>
    <rect x="79" y="82" width="375" height="228" rx="14" fill="#0f172a"/>
    <path d="M110 244 C160 176, 224 291, 294 214 S400 141, 425 238" fill="none" stroke="url(#stress)" stroke-width="32" stroke-linecap="round"/>
    <path d="M112 246 C160 180, 224 294, 294 217 S400 145, 424 240" fill="none" stroke="#ffffff" stroke-opacity="0.32" stroke-width="5"/>
    <g stroke="#94a3b8" stroke-width="1" opacity="0.55">
      <path d="M98 112 H437"/>
      <path d="M98 144 H437"/>
      <path d="M98 176 H437"/>
      <path d="M98 208 H437"/>
      <path d="M98 240 H437"/>
      <path d="M130 96 V292"/>
      <path d="M162 96 V292"/>
      <path d="M194 96 V292"/>
      <path d="M226 96 V292"/>
      <path d="M258 96 V292"/>
      <path d="M290 96 V292"/>
      <path d="M322 96 V292"/>
      <path d="M354 96 V292"/>
      <path d="M386 96 V292"/>
      <path d="M418 96 V292"/>
    </g>
    <rect x="94" y="323" width="376" height="18" rx="9" fill="#cbd5e1"/>
    <rect x="116" y="328" width="210" height="8" rx="4" fill="url(#stress)"/>
    <text x="496" y="136" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Abaqus/CAE</text>
    <text x="496" y="186" fill="#2563eb" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800">2026</text>
    <text x="496" y="234" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600">Finite Element Analysis</text>
    <text x="496" y="264" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600">Composite Structures</text>
    <text x="496" y="294" fill="#475569" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600">Impact and Damage Modeling</text>
  </g>
</svg>
